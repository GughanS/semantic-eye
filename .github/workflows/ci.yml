name: Semantic Eye CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ------------------------------------------------------------------
  # JOB 1: Frontend Build Check
  # Ensures the React app compiles without errors
  # ------------------------------------------------------------------
  frontend-build:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./frontend

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install Dependencies
      run: npm ci

    - name: Run Build
      run: npm run build

  # ------------------------------------------------------------------
  # JOB 2: Backend Install Check
  # Ensures Python dependencies (PyTorch, LanceDB) resolve correctly
  # ------------------------------------------------------------------
  backend-check:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./backend

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip' # Caches huge PyTorch downloads to speed up future runs

    - name: Install System Dependencies (OpenCV)
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1 libglib2.0-0

    - name: Install Python Libraries
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Verify Imports (Smoke Test)
      # This simple script ensures essential libraries load without crashing
      run: |
        python -c "import lancedb; import cv2; import sentence_transformers; print('Core libraries loaded successfully')"